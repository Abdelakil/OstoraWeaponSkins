name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore OstoraWeaponSkins.csproj

      - name: Build
        run: dotnet build OstoraWeaponSkins.csproj --no-restore --configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OstoraWeaponSkins
          path: build/net10.0/OstoraWeaponSkins.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: OstoraWeaponSkins
          path: release/

      - name: Create release archive
        run: |
          mkdir -p archive
          cp release/OstoraWeaponSkins.dll archive/
          cp -r data archive/
          cp -r resources archive/
          cp README.md archive/
          cd archive && zip -r ../OstoraWeaponSkins-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OstoraWeaponSkins ${{ github.ref_name }}
          body_path: ""
          body: |
            ## OstoraWeaponSkins ${{ github.ref_name }}

            ### Installation
            1. Extract the zip to your SwiftlyS2 `plugins/OstoraWeaponSkins/` directory
            2. Restart the server or run `sw_reload plugins OstoraWeaponSkins`
            3. Config auto-generates at `configs/plugins/OstoraWeaponSkins/config.json`

            ### Data files
            Place `skins_en.json`, `gloves_en.json`, `agents_en.json`, `music_en.json` in the `data/` directory.
          files: OstoraWeaponSkins-${{ github.ref_name }}.zip
