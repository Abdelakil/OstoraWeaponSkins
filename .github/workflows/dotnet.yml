name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore OstoraWeaponSkins.csproj

      - name: Build
        run: dotnet build OstoraWeaponSkins.csproj --no-restore --configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OstoraWeaponSkins
          path: build/net10.0/

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y.%m.%d').${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: OstoraWeaponSkins
          path: release/

      - name: Create release archive
        run: |
          cp -r data release/ 2>/dev/null || true
          cp -r resources release/ 2>/dev/null || true
          cd release
          zip -r ../OstoraWeaponSkins-${{ steps.version.outputs.tag }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OstoraWeaponSkins ${{ steps.version.outputs.tag }}
          body: |
            ## OstoraWeaponSkins ${{ steps.version.outputs.tag }}

            ### Installation
            1. Extract the zip to your SwiftlyS2 `plugins/OstoraWeaponSkins/` directory
            2. Restart the server or run `sw_reload plugins OstoraWeaponSkins`
            3. Config auto-generates at `configs/plugins/OstoraWeaponSkins/config.json`

            ### Data files
            Place `skins_en.json`, `gloves_en.json`, `agents_en.json`, `music_en.json` in the `data/` directory.
          files: OstoraWeaponSkins-${{ steps.version.outputs.tag }}.zip
